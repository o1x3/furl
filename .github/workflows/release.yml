name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          staging="furl-${version}-${{ matrix.target }}"
          bindir="target/${{ matrix.target }}/release"
          mkdir -p "$staging"
          cp "$bindir/furl" "$bindir/furls" "$bindir/furl-manager" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/" 2>/dev/null || true
          tarball="${staging}.tar.gz"
          tar czf "$tarball" "$staging"
          shasum -a 256 "$tarball" > "${tarball}.sha256"
          echo "ASSET=${tarball}" >> "$GITHUB_ENV"
          echo "ASSET_SHA=${tarball}.sha256" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $staging = "furl-$version-${{ matrix.target }}"
          $bindir = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "$bindir/furl.exe","$bindir/furls.exe","$bindir/furl-manager.exe" -Destination $staging
          foreach ($f in @("README.md","LICENSE-MIT","LICENSE-APACHE")) {
            if (Test-Path $f) { Copy-Item $f -Destination $staging }
          }
          $zip = "$staging.zip"
          Compress-Archive -Path $staging -DestinationPath $zip -Force
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          "$hash  $zip" | Out-File -Encoding ascii "$zip.sha256"
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii
          "ASSET_SHA=$zip.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: furl-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA }}
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -R dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
